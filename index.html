<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biot Clinic</title>
    <style>
        /* تنسيقات عامة لتناسب الآيباد والشاشات */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5; /* فضي كاشف جداً */
            color: #333;
        }

        /* الهيدر واللوغو في المنتصف */
        header {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        header img {
            max-height: 80px; /* تحكم بحجم اللوغو من هنا */
        }

        /* الحاوية الأساسية */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 20px;
            max-width: 600px;
            margin: auto;
        }

        /* تنسيق الصناديق */
        .card {
            background: white;
            width: 100%;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
        }

        h2 { color: #555; font-size: 1.2rem; margin-bottom: 15px; }

        /* الأزرار داخل الصناديق */
        .btn {
            display: block;
            background-color: #f9f9f9;
            color: #333;
            text-decoration: none;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            text-align: center;
            transition: 0.3s;
        }

        .btn:active { background-color: #eee; }

        /* خيار التقييم المميز */
        .review-card {
            background-color: #e8e8e8; /* لون مختلف قليلاً */
            border: 2px dashed #bbb;
            cursor: pointer;
            text-align: center;
        }

        .review-card h2 { margin-bottom: 0; color: #000; }

        /* لإظهار الصورة عند الضغط */
        #review-image {
            display: none;
            width: 100%;
            margin-top: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <header>
        <!-- استبدل logo.png باسم ملف اللوغو عندك -->
        <img src="logo.png" alt="Biot Clinic Logo">
    </header>

    <div class="container">
        
        <!-- الخيار الأول -->
        <div class="card">
            <h2>Dental Treatment</h2>
            <a href="treatment-recap-v3.html" class="btn">Patient Treatment Plan</a>
            <a href="B&A dental.pdf" class="btn">Before & After</a>
        </div>

        <!-- الخيار الثاني -->
        <div class="card">
            <h2>Hair Transplant</h2>
            <a href="biotclinic_form_EN.html" class="btn">Patient Form</a>
            <a href="hair transplant B&A.pdf" class="btn">Before & After</a>
            <a href="hair-transplant-planner.html" class="btn"> Initial Diagnosis</a>
        </div>

        <!-- خيار التقييم المميز -->
        <div class="card review-card" onclick="showReview()">
            <h2>Give us a review 😊</h2>
            <!-- استبدل review.jpg باسم ملف الصورة عندك -->
            <img id="review-image" src="reveiw.png" alt="Review QR">
        </div>

    </div>

    <script>
        function showReview() {
            var img = document.getElementById("review-image");
            if (img.style.display === "block") {
                img.style.display = "none";
            } else {
                img.style.display = "block";
            }
        }
    </script>

</body>
</html>
