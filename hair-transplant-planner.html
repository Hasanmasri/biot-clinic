<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FolliMap</title>
<style>
:root{
  --bg0:#090b0e;--bg1:#10131a;--bg2:#171c26;--bg3:#1e2535;--bg4:#262f42;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);
  --t1:#dde4f0;--t2:#7d8ea6;--t3:#4a5670;
  --blue:#3b8bfa;--green:#1fc98a;--amber:#f5a623;--red:#f04c5c;--purple:#9d6ef5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,sans-serif;background:var(--bg0);color:var(--t1);height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;user-select:none}

#hdr{height:46px;background:var(--bg1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.logo{font-size:14px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:7px}
.lm{width:25px;height:25px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:13px}
.sep{width:1px;height:20px;background:var(--bd2)}
.vtabs{display:flex;gap:2px}
.vt{height:27px;padding:0 9px;background:transparent;border:1px solid transparent;border-radius:5px;color:var(--t3);cursor:pointer;font-size:12px;transition:all .15s}
.vt.on{background:var(--bg3);color:var(--t1);border-color:var(--bd)}
.sp{flex:1}
.hb{height:27px;padding:0 9px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--t2);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px;transition:all .15s}
.hb:hover{background:var(--bg4);color:var(--t1)}
.hb.p{background:var(--blue);color:#fff;border-color:transparent}
.hb.p:hover{background:#2a7ae8}
.ib{width:27px;height:27px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.ib:hover{color:var(--t1);background:var(--bg4)}

#ws{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
#sb{width:58px;background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:2px;flex-shrink:0}
.tb{width:44px;height:44px;background:transparent;border:1px solid transparent;border-radius:7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--t3);transition:all .15s}
.tb:hover{background:var(--bg3);color:var(--t2);border-color:var(--bd)}
.tb.on{background:rgba(59,139,250,.16);color:var(--blue);border-color:rgba(59,139,250,.35)}
.tb svg{width:19px;height:19px;flex-shrink:0}
.tl{font-size:8px;letter-spacing:.3px;text-transform:uppercase;font-weight:600}
.ss{width:32px;height:1px;background:var(--bd);margin:3px 0}

/* CANVAS */
#ca{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#cw{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#070910;position:relative}
#cc{position:relative;display:inline-block;transform-origin:center center;box-shadow:0 0 0 1px var(--bd2),0 12px 50px rgba(0,0,0,.8);border-radius:3px}
#cc canvas{position:absolute;top:0;left:0;display:block}
#cp{position:relative!important}

/* BOTTOM */
#bb{height:32px;background:var(--bg1);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
#stxt{font-size:10px;color:var(--t3)}
.zb{width:21px;height:21px;background:var(--bg3);border:1px solid var(--bd);border-radius:4px;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.zb:hover{color:var(--t1)}
#zlbl{font-size:11px;color:var(--t2);min-width:36px;text-align:center}
#coords{font-size:10px;color:var(--t3);font-family:monospace;margin-left:auto}

/* RIGHT PANEL */
#rp{width:236px;background:var(--bg1);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.ps{border-bottom:1px solid var(--bd);flex-shrink:0}
.ph{height:32px;padding:0 10px;display:flex;align-items:center;justify-content:space-between}
.pt{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--t2)}
.pb{padding:7px 10px 11px}
.psc{flex:1;overflow-y:auto}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.lbl{font-size:11px;color:var(--t3)}
.val{font-size:11px;color:var(--t2);font-family:monospace}

input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--bg4);border-radius:2px;outline:none;margin:3px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--blue);cursor:pointer;border:2px solid var(--bg1)}

/* COLOR PICKER — THE FIX */
.color-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.color-preview{width:32px;height:32px;border-radius:6px;border:2px solid var(--bd2);cursor:pointer;flex-shrink:0;position:relative;overflow:hidden}
.color-preview input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;padding:0}
.color-swatches{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.sw{width:22px;height:22px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all .12s;flex-shrink:0}
.sw:hover,.sw.on{border-color:#fff;transform:scale(1.1)}

/* LINE STYLE */
.lsbs{display:flex;gap:3px;margin-top:5px}
.lsb{flex:1;height:27px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;cursor:pointer;color:var(--t2);font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:monospace;letter-spacing:1px}
.lsb.on{background:rgba(59,139,250,.15);color:var(--blue);border-color:rgba(59,139,250,.35)}

/* FILL TOGGLE */
.fill-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.tog{width:30px;height:16px;background:var(--bg4);border-radius:8px;cursor:pointer;position:relative;border:1px solid var(--bd2);transition:background .2s;flex-shrink:0}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;background:var(--t3);border-radius:50%;transition:all .2s}
.tog.on{background:rgba(59,139,250,.3);border-color:rgba(59,139,250,.5)}
.tog.on::after{left:16px;background:var(--blue)}
.fill-color-box{width:22px;height:22px;border-radius:5px;border:2px solid var(--bd2);cursor:pointer;position:relative;overflow:hidden;flex-shrink:0}
.fill-color-box input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;padding:0}

/* LAYERS */
.li{display:flex;align-items:center;gap:5px;padding:5px 6px;border-radius:5px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:all .1s}
.li:hover{background:var(--bg3)}
.li.on{background:var(--bg3);border-color:var(--bd)}
.ld{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.ln{flex:1;font-size:11px}
.lib{width:18px;height:18px;border-radius:3px;background:transparent;border:none;cursor:pointer;color:var(--t3);display:flex;align-items:center;justify-content:center;font-size:11px}
.lib:hover{color:var(--t2);background:var(--bg4)}

/* UPLOAD */
#uov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:20}
.uc{background:var(--bg2);border:1.5px dashed var(--bd2);border-radius:14px;padding:32px 28px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;transition:all .2s;max-width:280px;width:88%}
.uc:hover{border-color:var(--blue);background:rgba(59,139,250,.06)}
.ui{font-size:34px;opacity:.4}
.ut{font-size:14px;font-weight:600}
.us{font-size:11px;color:var(--t3);text-align:center;line-height:1.5}
#fi{display:none}

/* TOAST */
#toast{position:fixed;bottom:42px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--bd2);padding:6px 14px;border-radius:7px;font-size:12px;color:var(--t1);opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;white-space:nowrap}

/* PEN CURSOR */
.cursor-pen{cursor:crosshair}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
</style>
</head>
<body>

<div id="hdr">
  <div class="logo"><div class="lm">🧬</div>FolliMap</div>
  <div class="sep"></div>
  <div class="vtabs">
    <button class="vt on" onclick="switchView('front',this)">Front</button>
    <button class="vt"    onclick="switchView('left',this)">Left</button>
    <button class="vt"    onclick="switchView('right',this)">Right</button>
    <button class="vt"    onclick="switchView('back',this)">Back</button>
  </div>
  <div class="sp"></div>
  <div style="display:flex;gap:4px">
    <button class="ib" onclick="undo()" title="Undo Ctrl+Z">↩</button>
    <button class="ib" onclick="redo()" title="Redo Ctrl+Y">↪</button>
  </div>
  <div class="sep"></div>
  <button class="hb" onclick="exportImg()">⬇ Export</button>
  <button class="hb p" onclick="saveProj()">💾 Save</button>
</div>

<div id="ws">
  <!-- SIDEBAR -->
  <div id="sb">
    <!-- SELECT -->
    <div class="tb on" id="tb-select" onclick="setTool('select')" title="Select & move points (V)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5 3 19 12 12 12 8 20 5 3"/>
      </svg>
      <span class="tl">Select</span>
    </div>
    <!-- PEN TOOL -->
    <div class="tb" id="tb-pen" onclick="setTool('pen')" title="Pen tool — click to add points, double-click or Enter to finish (P)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19l7-7 3 3-7 7-3-3z"/>
        <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
        <path d="M2 2l7.586 7.586"/>
        <circle cx="11" cy="11" r="2"/>
      </svg>
      <span class="tl">Pen</span>
    </div>
    <!-- TEXT TOOL -->
    <div class="tb" id="tb-text" onclick="setTool('text')" title="Text — click to place (T)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 7 4 4 20 4 20 7"/>
        <line x1="9" y1="20" x2="15" y2="20"/>
        <line x1="12" y1="4" x2="12" y2="20"/>
      </svg>
      <span class="tl">Text</span>
    </div>
    <!-- ERASER -->
    <div class="tb" id="tb-eraser" onclick="setTool('eraser')" title="Eraser (E)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.71 4.63a1 1 0 010 1.41L9.41 17.34a2 2 0 01-2.83 0l-3.33-3.33a2 2 0 010-2.83L14.54 1.93a1 1 0 011.41 0z"/>
        <line x1="6" y1="18" x2="19" y2="18"/>
      </svg>
      <span class="tl">Erase</span>
    </div>
    <div class="ss"></div>
    <!-- DELETE -->
    <div class="tb" onclick="deleteSelected()" title="Delete selected (Del)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
      <span class="tl">Del</span>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="ca">
    <div id="cw">
      <div id="cc">
        <canvas id="cp"></canvas>
        <canvas id="cg"></canvas>
        <canvas id="cd"></canvas>
        <canvas id="co"></canvas>
      </div>
      <div id="uov">
        <div class="uc" onclick="document.getElementById('fi').click()">
          <div class="ui">🖼</div>
          <div class="ut">Upload Patient Photo</div>
          <div class="us">JPG or PNG — tap to browse</div>
        </div>
        <button class="hb" style="height:30px" onclick="loadDemo()">Use Demo Head</button>
      </div>
      <input type="file" id="fi" accept="image/*" onchange="loadImg(this)">
    </div>
    <div id="bb">
      <div class="dot"></div>
      <span id="stxt">Select mode — click a curve to edit</span>
      <div class="sep" style="margin:0 2px"></div>
      <button class="zb" onclick="adjustZoom(-.15)">−</button>
      <span id="zlbl">100%</span>
      <button class="zb" onclick="adjustZoom(.15)">+</button>
      <button class="zb" onclick="resetZoom()" style="width:auto;padding:0 6px;font-size:10px">Fit</button>
      <span id="coords">0, 0</span>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="rp">
    <div class="psc">

      <!-- STROKE -->
      <div class="ps">
        <div class="ph"><span class="pt">Stroke</span></div>
        <div class="pb">

          <!-- Color with real native picker -->
          <div class="lbl" style="margin-bottom:4px">Color</div>
          <div class="color-row">
            <div class="color-preview" id="colorPreview" style="background:#3b8bfa">
              <input type="color" id="colorPicker" value="#3b8bfa" oninput="onColorInput(this.value)">
            </div>
            <span style="font-size:11px;color:var(--t2);font-family:monospace" id="colorHex">#3b8bfa</span>
          </div>
          <div class="color-swatches">
            <div class="sw on" style="background:#3b8bfa" onclick="pickSwatch('#3b8bfa',this)"></div>
            <div class="sw" style="background:#1fc98a" onclick="pickSwatch('#1fc98a',this)"></div>
            <div class="sw" style="background:#f5a623" onclick="pickSwatch('#f5a623',this)"></div>
            <div class="sw" style="background:#f04c5c" onclick="pickSwatch('#f04c5c',this)"></div>
            <div class="sw" style="background:#9d6ef5" onclick="pickSwatch('#9d6ef5',this)"></div>
            <div class="sw" style="background:#18c8c8" onclick="pickSwatch('#18c8c8',this)"></div>
            <div class="sw" style="background:#ffffff" onclick="pickSwatch('#ffffff',this)"></div>
            <div class="sw" style="background:#f97316" onclick="pickSwatch('#f97316',this)"></div>
            <div class="sw" style="background:#000000;border-color:var(--bd2)" onclick="pickSwatch('#000000',this)" title="Black"></div>
            <div class="sw" style="background:#8b0000" onclick="pickSwatch('#8b0000',this)" title="Dark Red"></div>
          </div>

          <div class="row" style="margin-top:12px"><span class="lbl">Thickness</span><span class="val" id="tv">3 px</span></div>
          <input type="range" id="sl-t" min="1" max="30" value="3" oninput="setThick(+this.value)">

          <div class="row" style="margin-top:9px"><span class="lbl">Opacity</span><span class="val" id="ov">90%</span></div>
          <input type="range" id="sl-o" min="10" max="100" value="90" oninput="setOp(+this.value)">

          <div class="row" style="margin-top:9px"><span class="lbl">Line style</span></div>
          <div class="lsbs">
            <button class="lsb on" id="ls-solid"  onclick="setLS('solid')">——</button>
            <button class="lsb"    id="ls-dashed"  onclick="setLS('dashed')">- -</button>
            <button class="lsb"    id="ls-dotted"  onclick="setLS('dotted')">···</button>
          </div>

          <!-- FILL -->
          <div class="fill-row">
            <div class="tog" id="tog-fill" onclick="togFill()"></div>
            <span class="lbl">Fill interior</span>
            <div class="fill-color-box" id="fillBox" style="background:rgba(59,139,250,.25)">
              <input type="color" id="fillPicker" value="#3b8bfa" oninput="onFillInput(this.value)">
            </div>
            <div class="row" style="margin:0"><span class="val" id="fopv">25%</span></div>
          </div>
          <div id="fill-op-row" style="display:none;margin-top:6px">
            <div class="row"><span class="lbl">Fill opacity</span><span class="val" id="fov">25%</span></div>
            <input type="range" id="sl-fo" min="5" max="100" value="25" oninput="setFillOp(+this.value)">
          </div>

        </div>
      </div>

      <!-- TEXT OPTIONS -->
      <div class="ps" id="text-panel">
        <div class="ph"><span class="pt">Text</span></div>
        <div class="pb">
          <div class="row"><span class="lbl">Font size</span><span class="val" id="fsv">22 px</span></div>
          <input type="range" id="sl-fs" min="10" max="72" value="22" oninput="setFontSize(+this.value)">
          <div class="row" style="margin-top:9px"><span class="lbl">Style</span></div>
          <div class="lsbs">
            <button class="lsb on" id="fw-normal" onclick="setFontWeight('normal')">A</button>
            <button class="lsb" id="fw-bold" onclick="setFontWeight('bold')"><b>B</b></button>
            <button class="lsb" id="fw-italic" onclick="setFontStyle('italic')"><i>I</i></button>
          </div>
        </div>
      </div>

      <!-- GUIDES -->
      <div class="ps">
        <div class="ph"><span class="pt">Guides</span></div>
        <div class="pb">
          <div class="row"><span class="lbl">Symmetry mirror</span><div class="tog" id="tog-sym" onclick="togG('sym')"></div></div>
          <div class="row"><span class="lbl">Grid</span><div class="tog" id="tog-grid" onclick="togG('grid')"></div></div>
        </div>
      </div>

      <!-- LAYERS -->
      <div class="ps" style="border-bottom:none;flex:1">
        <div class="ph">
          <span class="pt">Layers</span>
          <button class="ib" style="width:20px;height:20px;font-size:14px" onclick="addLayer()">+</button>
        </div>
        <div class="pb" id="lyrs"></div>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CANVAS INIT
// ═══════════════════════════════════════════════════════════
const CW=600, CH=720;
const cvP=document.getElementById('cp');
const cvG=document.getElementById('cg');
const cvD=document.getElementById('cd');
const cvO=document.getElementById('co');
const cc =document.getElementById('cc');
const ctxP=cvP.getContext('2d');
const ctxG=cvG.getContext('2d');
const ctxD=cvD.getContext('2d');
const ctxO=cvO.getContext('2d');

[cvP,cvG,cvD,cvO].forEach(c=>{
  c.width=CW; c.height=CH;
  c.style.width=CW+'px'; c.style.height=CH+'px';
});
cc.style.width=CW+'px'; cc.style.height=CH+'px';

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
// Curve = { id, layer, color, thick, op, ls, fill, fillColor, fillOp, pts:[{x,y}] }
let curves=[], selectedId=null;
let undoQ=[], redoQ=[];
let curView='front';
const views={front:[],left:[],right:[],back:[]};

let tool='select';
let penColor='#3b8bfa', penThick=3, penOp=0.9, penLS='solid';
let fillOn=false, fillColor='#3b8bfa', fillOp=0.25;
let symOn=false, gridOn=false;

// zoom/pan
let vscale=1, vox=0, voy=0, panStart=null;

// PEN TOOL state
let penActive=false;       // currently placing points
let penPts=[];             // points placed so far
let penMouse={x:0,y:0};   // live mouse for preview line

// TEXT TOOL state
let textLabels=[];  // {id,x,y,text,color,size,weight,style,layer}
let fontSize=22, fontWeight='normal', fontItalic='normal';
let editingLabelId=null;  // id of label being inline-edited
let textInput=null;       // the floating <input> DOM element

// drag (select tool)
let dragCurveId=null, dragPtIdx=null;

const LAYERS=[
  {id:'layer1',name:'Layer 1',color:'#3b8bfa',vis:true,locked:false},
];
let activeLayer='layer1';

let _uid=1;
function nextId(){ return 'c'+(++_uid)+'_'+Date.now(); }

// ═══════════════════════════════════════════════════════════
// CATMULL-ROM
// ═══════════════════════════════════════════════════════════
function catmullPath(ctx,pts,closed){
  if(pts.length<2) return;
  const p=closed?[pts[pts.length-1],...pts,pts[0],pts[1]]:[pts[0],...pts,pts[pts.length-1]];
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<p.length-2;i++){
    const p0=p[i-1],p1=p[i],p2=p[i+1],p3=p[i+2];
    const cp1x=p1.x+(p2.x-p0.x)/6, cp1y=p1.y+(p2.y-p0.y)/6;
    const cp2x=p2.x-(p3.x-p1.x)/6, cp2y=p2.y-(p3.y-p1.y)/6;
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2.x,p2.y);
  }
  if(closed) ctx.closePath();
}

function applyDash(ctx,ls,w){
  if(ls==='dashed')      ctx.setLineDash([w*5,w*2.5]);
  else if(ls==='dotted') ctx.setLineDash([1.5,w*3]);
  else                   ctx.setLineDash([]);
}

// ═══════════════════════════════════════════════════════════
// RENDER CURVES LAYER
// ═══════════════════════════════════════════════════════════
function renderCurves(){
  ctxD.clearRect(0,0,CW,CH);
  for(const c of curves){
    const lay=LAYERS.find(l=>l.id===c.layer);
    if(lay&&!lay.vis) continue;
    paintCurve(ctxD,c);
  }
}

function paintCurve(ctx,c){
  if(!c.pts||c.pts.length<2) return;
  ctx.save();

  // FILL
  if(c.fill&&c.pts.length>=3){
    ctx.globalAlpha=c.fillOp;
    ctx.fillStyle=c.fillColor;
    ctx.beginPath();
    catmullPath(ctx,c.pts,true);
    ctx.fill();
  }

  // STROKE
  ctx.globalAlpha=c.op;
  ctx.strokeStyle=c.color;
  ctx.lineWidth=c.thick;
  ctx.lineCap='round'; ctx.lineJoin='round';
  applyDash(ctx,c.ls,c.thick);
  ctx.beginPath();
  catmullPath(ctx,c.pts,false);
  ctx.stroke();

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// RENDER OVERLAY (handles + pen preview)
// ═══════════════════════════════════════════════════════════
function renderOverlay(){
  ctxO.clearRect(0,0,CW,CH);

  // ── PEN TOOL live preview ──
  if(tool==='pen'&&penActive&&penPts.length>0){
    const all=[...penPts,penMouse];

    // fill preview
    if(fillOn&&all.length>=3){
      ctxO.save();
      ctxO.globalAlpha=fillOp*.6;
      ctxO.fillStyle=fillColor;
      ctxO.beginPath();
      catmullPath(ctxO,all,true);
      ctxO.fill();
      ctxO.restore();
    }

    // stroke preview
    ctxO.save();
    ctxO.globalAlpha=penOp*.7;
    ctxO.strokeStyle=penColor;
    ctxO.lineWidth=penThick;
    ctxO.lineCap='round'; ctxO.lineJoin='round';
    applyDash(ctxO,penLS,penThick);
    ctxO.beginPath();
    catmullPath(ctxO,all,false);
    ctxO.stroke();
    ctxO.restore();

    // dashed closing line back to first point
    if(penPts.length>=2){
      ctxO.save();
      ctxO.strokeStyle='rgba(255,255,255,.3)';
      ctxO.lineWidth=1; ctxO.setLineDash([4,4]);
      ctxO.beginPath();
      ctxO.moveTo(penMouse.x,penMouse.y);
      ctxO.lineTo(penPts[0].x,penPts[0].y);
      ctxO.stroke();
      ctxO.restore();
    }

    // placed point dots
    penPts.forEach((p,i)=>{
      ctxO.save();
      ctxO.strokeStyle='rgba(255,255,255,.9)'; ctxO.lineWidth=1.5; ctxO.setLineDash([]);
      ctxO.beginPath(); ctxO.arc(p.x,p.y,7,0,Math.PI*2); ctxO.stroke();
      ctxO.fillStyle= i===0?'#fff':penColor; ctxO.globalAlpha=.9;
      ctxO.beginPath(); ctxO.arc(p.x,p.y,5,0,Math.PI*2); ctxO.fill();
      ctxO.restore();
    });

    // cursor dot at mouse
    ctxO.save();
    ctxO.fillStyle='#fff'; ctxO.globalAlpha=.7;
    ctxO.beginPath(); ctxO.arc(penMouse.x,penMouse.y,3,0,Math.PI*2); ctxO.fill();
    ctxO.restore();
  }

  // ── SELECTED curve handles ──
  if(selectedId){
    const c=curves.find(x=>x.id===selectedId);
    if(c&&c.pts.length>=2){
      // skeleton lines
      ctxO.save();
      ctxO.strokeStyle='rgba(255,255,255,.18)';
      ctxO.lineWidth=1; ctxO.setLineDash([4,4]);
      ctxO.beginPath();
      c.pts.forEach((p,i)=>i===0?ctxO.moveTo(p.x,p.y):ctxO.lineTo(p.x,p.y));
      ctxO.stroke(); ctxO.restore();

      // handle points
      c.pts.forEach((p,i)=>{
        const dragging=dragCurveId===c.id&&dragPtIdx===i;
        ctxO.save();
        ctxO.setLineDash([]);
        // outer ring
        ctxO.strokeStyle=dragging?'#fff':'rgba(255,255,255,.85)';
        ctxO.lineWidth=1.5;
        ctxO.beginPath(); ctxO.arc(p.x,p.y,dragging?9:7,0,Math.PI*2); ctxO.stroke();
        // fill
        ctxO.fillStyle=dragging?'#fff':c.color;
        ctxO.globalAlpha=dragging?1:.85;
        ctxO.beginPath(); ctxO.arc(p.x,p.y,dragging?7:5,0,Math.PI*2); ctxO.fill();
        // number
        ctxO.globalAlpha=1; ctxO.fillStyle='#000';
        ctxO.font='bold 8px system-ui'; ctxO.textAlign='center'; ctxO.textBaseline='middle';
        ctxO.fillText(i+1,p.x,p.y);
        ctxO.restore();
      });
    }
  }
}

function fullRender(){ renderCurves(); renderLabels(); renderOverlay(); }

// ═══════════════════════════════════════════════════════════
// HIT TEST
// ═══════════════════════════════════════════════════════════
const HR=11;
function hitHandle(x,y){
  const check=c=>{
    for(let i=c.pts.length-1;i>=0;i--)
      if(Math.hypot(c.pts[i].x-x,c.pts[i].y-y)<HR) return {curveId:c.id,ptIdx:i};
    return null;
  };
  if(selectedId){ const c=curves.find(x=>x.id===selectedId); if(c){const h=check(c);if(h)return h;} }
  for(const c of [...curves].reverse()){ const h=check(c); if(h) return h; }
  return null;
}

function nearCurve(c,tx,ty,thresh){
  if(c.pts.length<2) return false;
  const p=[c.pts[0],...c.pts,c.pts[c.pts.length-1]];
  for(let seg=1;seg<p.length-2;seg++){
    const p0=p[seg-1],p1=p[seg],p2=p[seg+1],p3=p[seg+2];
    for(let t=0;t<=1;t+=.02){
      const t2=t*t,t3=t2*t;
      const x=.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3);
      const y=.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3);
      if(Math.hypot(x-tx,y-ty)<thresh) return true;
    }
  }
  // also check fill hit
  if(c.fill&&c.pts.length>=3){
    // simple bounding box + rough polygon test
    if(pointInPoly(c.pts,tx,ty)) return true;
  }
  return false;
}

function pointInPoly(pts,x,y){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;
    if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

function hitCurve(x,y){
  for(let i=curves.length-1;i>=0;i--){
    const c=curves[i];
    const lay=LAYERS.find(l=>l.id===c.layer);
    if(lay&&!lay.vis) continue;
    if(nearCurve(c,x,y,Math.max(8,c.thick+5))) return c.id;
  }
  return null;
}

// ═══════════════════════════════════════════════════════════
// POINTER EVENTS
// ═══════════════════════════════════════════════════════════
function getXY(e){
  const r=cvO.getBoundingClientRect();
  const sx=CW/r.width, sy=CH/r.height;
  const src=e.touches?e.touches[0]:e;
  return {x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy};
}

cvO.addEventListener('pointerdown', onDown);
cvO.addEventListener('pointermove', onMove);
cvO.addEventListener('pointerup',   onUp);
cvO.addEventListener('pointercancel', ()=>{ dragCurveId=null; dragPtIdx=null; });
cvO.addEventListener('wheel', e=>{ e.preventDefault(); adjustZoom(e.deltaY<0?.12:-.12); },{passive:false});

let isPointerDown=false;

function onDown(e){
  e.preventDefault();
  cvO.setPointerCapture(e.pointerId);
  isPointerDown=true;
  const pt=getXY(e);

  // ── PAN ──
  if(tool==='pan'){ panStart={ex:e.clientX-vox,ey:e.clientY-voy}; return; }

  // ── ERASER ──
  if(tool==='eraser'){ eraseAt(pt); return; }

  // ── TEXT TOOL ──
  if(tool==='text'){
    // check if clicking an existing label to edit it
    const hit=hitLabel(pt.x,pt.y);
    if(hit){ startEditLabel(hit); return; }
    // place new label
    spawnTextInput(pt.x,pt.y,null);
    return;
  }

  // ── PEN TOOL ──
  if(tool==='pen'){
    if(!penActive){
      // start new path
      penActive=true;
      penPts=[{...pt}];
    } else {
      // check if clicking near first point → close & finish
      if(penPts.length>=3&&Math.hypot(pt.x-penPts[0].x,pt.y-penPts[0].y)<14){
        finishPen(true);
        return;
      }
      penPts.push({...pt});
    }
    renderOverlay();
    return;
  }

  // ── SELECT ──
  if(tool==='select'){
    const h=hitHandle(pt.x,pt.y);
    if(h){
      selectedId=h.curveId;
      dragCurveId=h.curveId; dragPtIdx=h.ptIdx;
      syncPanel();
      renderCurves(); renderLabels(); renderOverlay(); return;
    }
    const cid=hitCurve(pt.x,pt.y);
    if(cid){ selectedId=cid; dragCurveId=null; dragPtIdx=null; syncPanel(); renderCurves(); renderLabels(); renderOverlay(); return; }
    // check label hit
    const lid=hitLabel(pt.x,pt.y);
    if(lid){ selectedId=lid; dragCurveId=null; dragPtIdx=null; renderCurves(); renderLabels(); renderOverlay(); return; }
    selectedId=null; dragCurveId=null; dragPtIdx=null;
    renderCurves(); renderLabels(); renderOverlay();
  }
}

let _snapThrottle=false;
function snapshotThrottle(){ if(_snapThrottle)return; _snapThrottle=true; snapshot(); setTimeout(()=>_snapThrottle=false,300); }

function onMove(e){
  e.preventDefault();
  const pt=getXY(e);
  document.getElementById('coords').textContent=`${Math.round(pt.x)}, ${Math.round(pt.y)}`;

  if(tool==='pan'&&panStart){ vox=e.clientX-panStart.ex; voy=e.clientY-panStart.ey; applyT(); return; }
  if(tool==='eraser'&&isPointerDown){ eraseAt(pt); return; }

  // pen preview
  if(tool==='pen'){ penMouse={...pt}; renderOverlay(); return; }

  // drag handle
  if(tool==='select'&&isPointerDown&&dragCurveId!==null&&dragPtIdx!==null){
    snapshotThrottle();
    const c=curves.find(x=>x.id===dragCurveId);
    if(c){ c.pts[dragPtIdx]={x:pt.x,y:pt.y}; renderCurves(); renderOverlay(); }
    return;
  }

  // hover cursor
  if(tool==='select'){
    const h=hitHandle(pt.x,pt.y);
    cvO.style.cursor=h?'grab':(hitCurve(pt.x,pt.y)?'pointer':'default');
  }
}

function onUp(e){
  e.preventDefault();
  isPointerDown=false;
  if(tool==='pan'){ panStart=null; return; }
  dragCurveId=null; dragPtIdx=null;
}

// Double-click → finish pen path (open)
cvO.addEventListener('dblclick', e=>{
  if(tool==='pen'&&penActive&&penPts.length>=2){
    // remove last point (it was added on first click of dblclick)
    penPts.pop();
    finishPen(false);
  }
});

function finishPen(closed){
  if(penPts.length<2){ penActive=false; penPts=[]; renderOverlay(); return; }
  snapshot();
  const id=nextId();
  curves.push({
    id, layer:activeLayer,
    color:penColor, thick:penThick, op:penOp, ls:penLS,
    fill:fillOn, fillColor:fillColor, fillOp:fillOp,
    pts:[...penPts]
  });
  if(symOn){
    curves.push({
      id:nextId(), layer:activeLayer,
      color:penColor, thick:penThick, op:penOp*.55, ls:penLS,
      fill:fillOn, fillColor:fillColor, fillOp:fillOp*.55,
      pts:penPts.map(p=>({x:CW-p.x,y:p.y}))
    });
  }
  selectedId=id;
  penActive=false; penPts=[];
  redoQ=[];
  syncPanel();
  setTool('select');
  fullRender();
  toast(closed?'Path closed — drag points to refine':'Path done — drag points to refine');
}

// ═══════════════════════════════════════════════════════════
// TEXT LABELS
// ═══════════════════════════════════════════════════════════
function renderLabels(){
  // labels drawn on cvD on top of curves
  // we use ctxD with a separate pass
  for(const lb of textLabels){
    const lay=LAYERS.find(l=>l.id===lb.layer);
    if(lay&&!lay.vis) continue;
    if(lb.id===editingLabelId) continue; // skip while inline editing
    ctxD.save();
    ctxD.globalAlpha=penOp;
    ctxD.fillStyle=lb.color;
    ctxD.font=`${lb.italic||'normal'} ${lb.weight||'normal'} ${lb.size}px system-ui,sans-serif`;
    ctxD.textBaseline='top';
    ctxD.fillText(lb.text, lb.x, lb.y);
    // selection ring
    if(selectedId===lb.id){
      const m=ctxD.measureText(lb.text);
      ctxD.strokeStyle='rgba(59,139,250,.7)';
      ctxD.lineWidth=1.5; ctxD.setLineDash([4,3]);
      ctxD.strokeRect(lb.x-3, lb.y-3, m.width+6, lb.size+8);
      ctxD.setLineDash([]);
    }
    ctxD.restore();
  }
}

function hitLabel(x,y){
  // returns label id or null
  for(let i=textLabels.length-1;i>=0;i--){
    const lb=textLabels[i];
    const lay=LAYERS.find(l=>l.id===lb.layer);
    if(lay&&!lay.vis) continue;
    // rough bbox
    ctxD.font=`${lb.italic||'normal'} ${lb.weight||'normal'} ${lb.size}px system-ui,sans-serif`;
    const w=ctxD.measureText(lb.text).width;
    if(x>=lb.x-3&&x<=lb.x+w+6&&y>=lb.y-3&&y<=lb.y+lb.size+8) return lb.id;
  }
  return null;
}

function spawnTextInput(cx,cy,existingId){
  // remove any existing input
  dismissTextInput(false);

  const lb=existingId?textLabels.find(x=>x.id===existingId):null;
  editingLabelId=existingId||null;

  // get canvas bounding rect for absolute positioning
  const rect=cvO.getBoundingClientRect();
  const scaleX=rect.width/CW, scaleY=rect.height/CH;

  // canvas coords → screen coords (accounting for zoom+pan)
  // cc is transformed; we need to find where canvas point lands on screen
  const ccRect=cc.getBoundingClientRect();
  const screenX=ccRect.left+(cx/CW)*ccRect.width;
  const screenY=ccRect.top+(cy/CH)*ccRect.height;

  const inp=document.createElement('input');
  inp.type='text';
  inp.value=lb?lb.text:'';
  inp.placeholder='Type text…';

  const sz=lb?lb.size:fontSize;
  const scaledSz=sz*vscale;

  Object.assign(inp.style,{
    position:'fixed',
    left:screenX+'px',
    top:screenY+'px',
    minWidth:'80px',
    maxWidth:'400px',
    background:'rgba(10,12,20,.85)',
    border:'1.5px solid rgba(59,139,250,.8)',
    borderRadius:'4px',
    color: lb?lb.color:penColor,
    fontSize: scaledSz+'px',
    fontWeight: lb?lb.weight:fontWeight,
    fontStyle: lb?lb.italic:fontItalic,
    fontFamily:'system-ui,sans-serif',
    padding:'2px 6px',
    outline:'none',
    zIndex:'9999',
    boxShadow:'0 4px 20px rgba(0,0,0,.6)',
    lineHeight:'1.3'
  });

  document.body.appendChild(inp);
  textInput=inp;
  inp.focus();
  if(lb) inp.select();

  const commit=()=>{
    const txt=inp.value.trim();
    dismissTextInput(false);
    if(!txt) return;
    if(existingId){
      const l=textLabels.find(x=>x.id===existingId);
      if(l){ snapshot(); l.text=txt; l.color=penColor; l.size=fontSize; l.weight=fontWeight; l.italic=fontItalic; }
    } else {
      snapshot();
      textLabels.push({id:nextId(),layer:activeLayer,x:cx,y:cy,text:txt,color:penColor,size:fontSize,weight:fontWeight,italic:fontItalic});
    }
    editingLabelId=null;
    redoQ=[];
    fullRender();
  };

  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){ e.preventDefault(); commit(); }
    if(e.key==='Escape'){ dismissTextInput(false); }
  });
  inp.addEventListener('blur',()=>{ commit(); });
}

function startEditLabel(id){
  const lb=textLabels.find(x=>x.id===id); if(!lb) return;
  selectedId=id;
  spawnTextInput(lb.x,lb.y,id);
  renderCurves(); renderLabels();
}

function dismissTextInput(andCancel){
  if(textInput){ textInput.removeEventListener('blur',()=>{}); textInput.remove(); textInput=null; }
  if(andCancel) editingLabelId=null;
}

// Override deleteSelected to also handle labels
const _origDeleteSelected=window.deleteSelected;

// ═══════════════════════════════════════════════════════════
// ERASER
// ═══════════════════════════════════════════════════════════
function eraseAt(pt){
  const r=22;
  const prevC=curves.length, prevL=textLabels.length;
  curves=curves.filter(c=>{
    const lay=LAYERS.find(l=>l.id===c.layer);
    if(lay&&lay.locked) return true;
    return !nearCurve(c,pt.x,pt.y,r);
  });
  textLabels=textLabels.filter(lb=>{
    const lay=LAYERS.find(l=>l.id===lb.layer);
    if(lay&&lay.locked) return true;
    ctxD.font=`${lb.italic||'normal'} ${lb.weight||'normal'} ${lb.size}px system-ui,sans-serif`;
    const w=ctxD.measureText(lb.text).width;
    const inBox=pt.x>=lb.x-r&&pt.x<=lb.x+w+r&&pt.y>=lb.y-r&&pt.y<=lb.y+lb.size+r;
    return !inBox;
  });
  if(curves.length!==prevC||textLabels.length!==prevL){
    if(!curves.find(x=>x.id===selectedId)&&!textLabels.find(x=>x.id===selectedId)) selectedId=null;
    renderCurves(); renderLabels(); renderOverlay();
  }
}

// ═══════════════════════════════════════════════════════════
// DELETE
// ═══════════════════════════════════════════════════════════
function deleteSelected(){
  if(!selectedId) return;
  snapshot();
  curves=curves.filter(c=>c.id!==selectedId);
  textLabels=textLabels.filter(l=>l.id!==selectedId);
  selectedId=null; redoQ=[];
  fullRender(); toast('Deleted');
}

document.addEventListener('keydown',e=>{
  if(tool==='pen'&&(e.key==='Enter'||e.key==='Escape')){
    e.preventDefault();
    if(e.key==='Enter'&&penPts.length>=2) finishPen(false);
    if(e.key==='Escape'){ penActive=false; penPts=[]; renderOverlay(); }
    return;
  }
  if(e.key==='Delete'||e.key==='Backspace'){ if(selectedId){e.preventDefault();deleteSelected();} return; }
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){ e.preventDefault(); undo(); return; }
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||e.key==='Z')){ e.preventDefault(); redo(); return; }
  if(!e.ctrlKey&&!e.metaKey){
    if(e.key==='v'||e.key==='s') setTool('select');
    if(e.key==='p')              setTool('pen');
    if(e.key==='e')              setTool('eraser');
    if(e.key==='t')              setTool('text');
  }
});

// ═══════════════════════════════════════════════════════════
// UNDO / REDO
// ═══════════════════════════════════════════════════════════
function snapshot(){ undoQ.push(JSON.stringify(curves)); if(undoQ.length>80) undoQ.shift(); }
function undo(){ if(!undoQ.length)return; redoQ.push(JSON.stringify(curves)); curves=JSON.parse(undoQ.pop()); selectedId=null; fullRender(); }
function redo(){ if(!redoQ.length)return; undoQ.push(JSON.stringify(curves)); curves=JSON.parse(redoQ.pop()); selectedId=null; fullRender(); }

// ═══════════════════════════════════════════════════════════
// ZOOM / PAN
// ═══════════════════════════════════════════════════════════
function applyT(){ cc.style.transform=`translate(${vox}px,${voy}px) scale(${vscale})`; document.getElementById('zlbl').textContent=Math.round(vscale*100)+'%'; }
function adjustZoom(d){ vscale=Math.max(.2,Math.min(5,vscale+d)); applyT(); }
function resetZoom(){ vscale=1;vox=0;voy=0; applyT(); }

// Touch pinch
let _td0=null;
cvO.addEventListener('touchstart',e=>{ if(e.touches.length===2) _td0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); },{passive:true});
cvO.addEventListener('touchmove',e=>{ if(e.touches.length===2&&_td0!=null){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); adjustZoom((d-_td0)*.003); _td0=d; } },{passive:true});
cvO.addEventListener('touchend',()=>_td0=null);

// ═══════════════════════════════════════════════════════════
// COLOR — THE KEY FIX
// Updates preview box background + hex label + internal state
// ═══════════════════════════════════════════════════════════
function onColorInput(hex){
  penColor=hex;
  document.getElementById('colorPreview').style.background=hex;
  document.getElementById('colorHex').textContent=hex;
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
  if(selectedId){ const c=curves.find(x=>x.id===selectedId); if(c){c.color=hex;renderCurves();renderOverlay();} }
}

function pickSwatch(hex,el){
  penColor=hex;
  document.getElementById('colorPicker').value=hex;
  document.getElementById('colorPreview').style.background=hex;
  document.getElementById('colorHex').textContent=hex;
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
  el.classList.add('on');
  if(selectedId){ const c=curves.find(x=>x.id===selectedId); if(c){c.color=hex;renderCurves();renderOverlay();} }
}

// ═══════════════════════════════════════════════════════════
// STROKE CONTROLS
// ═══════════════════════════════════════════════════════════
function setThick(v){
  penThick=v; document.getElementById('tv').textContent=v+' px';
  if(selectedId){ const c=curves.find(x=>x.id===selectedId); if(c){c.thick=v;renderCurves();renderOverlay();} }
}
function setOp(v){
  penOp=v/100; document.getElementById('ov').textContent=v+'%';
  if(selectedId){ const c=curves.find(x=>x.id===selectedId); if(c){c.op=penOp;renderCurves();renderOverlay();} }
}
function setLS(s){
  penLS=s;
  document.querySelectorAll('.lsb').forEach(b=>b.classList.remove('on'));
  document.getElementById('ls-'+s).classList.add('on');
  if(selectedId){ const c=curves.find(x=>x.id===selectedId); if(c){c.ls=s;renderCurves();renderOverlay();} }
}

function setFontSize(v){
  fontSize=v; document.getElementById('fsv').textContent=v+' px';
  if(selectedId){ const l=textLabels.find(x=>x.id===selectedId); if(l){snapshot();l.size=v;fullRender();} }
}
function setFontWeight(w){
  fontWeight=w;
  document.querySelectorAll('#fw-normal,#fw-bold').forEach(b=>b.classList.remove('on'));
  document.getElementById('fw-'+w).classList.add('on');
  if(selectedId){ const l=textLabels.find(x=>x.id===selectedId); if(l){snapshot();l.weight=w;fullRender();} }
}
function setFontStyle(s){
  fontItalic=fontItalic==='italic'?'normal':'italic';
  document.getElementById('fw-italic').classList.toggle('on',fontItalic==='italic');
  if(selectedId){ const l=textLabels.find(x=>x.id===selectedId); if(l){snapshot();l.italic=fontItalic;fullRender();} }
}

// ═══════════════════════════════════════════════════════════
// FILL
// ═══════════════════════════════════════════════════════════
function togFill(){
  fillOn=!fillOn;
  document.getElementById('tog-fill').classList.toggle('on',fillOn);
  document.getElementById('fill-op-row').style.display=fillOn?'block':'none';
  document.getElementById('fopv').textContent=fillOn?(Math.round(fillOp*100)+'%'):'';
  if(selectedId){ const c=curves.find(x=>x.id===selectedId); if(c){c.fill=fillOn;renderCurves();renderOverlay();} }
}
function onFillInput(hex){
  fillColor=hex;
  document.getElementById('fillBox').style.background=`rgba(${hexToRgb(hex).join(',')},${fillOp})`;
  if(selectedId){ const c=curves.find(x=>x.id===selectedId); if(c){c.fillColor=hex;renderCurves();renderOverlay();} }
}
function setFillOp(v){
  fillOp=v/100;
  document.getElementById('fov').textContent=v+'%';
  document.getElementById('fopv').textContent=v+'%';
  const rgb=hexToRgb(fillColor);
  document.getElementById('fillBox').style.background=`rgba(${rgb.join(',')},${fillOp})`;
  if(selectedId){ const c=curves.find(x=>x.id===selectedId); if(c){c.fillOp=fillOp;renderCurves();renderOverlay();} }
}
function hexToRgb(hex){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return[r,g,b]; }

// ═══════════════════════════════════════════════════════════
// SYNC PANEL → SELECTED
// ═══════════════════════════════════════════════════════════
function syncPanel(){
  if(!selectedId) return;
  const c=curves.find(x=>x.id===selectedId); if(!c) return;
  penColor=c.color; penThick=c.thick; penOp=c.op; penLS=c.ls;
  fillOn=c.fill||false; fillColor=c.fillColor||penColor; fillOp=c.fillOp||.25;
  document.getElementById('colorPicker').value=c.color;
  document.getElementById('colorPreview').style.background=c.color;
  document.getElementById('colorHex').textContent=c.color;
  document.getElementById('sl-t').value=c.thick;
  document.getElementById('tv').textContent=c.thick+' px';
  document.getElementById('sl-o').value=Math.round(c.op*100);
  document.getElementById('ov').textContent=Math.round(c.op*100)+'%';
  document.querySelectorAll('.lsb').forEach(b=>b.classList.remove('on'));
  const lb=document.getElementById('ls-'+c.ls); if(lb) lb.classList.add('on');
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
  document.getElementById('tog-fill').classList.toggle('on',fillOn);
  document.getElementById('fill-op-row').style.display=fillOn?'block':'none';
  if(c.fillColor) document.getElementById('fillPicker').value=c.fillColor;
  document.getElementById('sl-fo').value=Math.round(fillOp*100);
  document.getElementById('fov').textContent=Math.round(fillOp*100)+'%';
  document.getElementById('fopv').textContent=fillOn?Math.round(fillOp*100)+'%':'';
}

// ═══════════════════════════════════════════════════════════
// TOOL
// ═══════════════════════════════════════════════════════════
function setTool(t){
  // cancel pen if switching away
  if(tool==='pen'&&t!=='pen'&&penActive){ penActive=false; penPts=[]; renderOverlay(); }
  // dismiss text input if switching away
  if(tool==='text'&&t!=='text'){ dismissTextInput(true); }
  tool=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  const b=document.getElementById('tb-'+t); if(b) b.classList.add('on');
  cvO.style.cursor=t==='pen'?'crosshair':t==='eraser'?'crosshair':t==='text'?'text':'default';
  // show/hide text panel
  const tp=document.getElementById('text-panel');
  if(tp) tp.style.display=t==='text'?'block':'none';
  const m={
    select:'Click curve or text to select — drag numbered points to reshape',
    pen:'Click to place points — double-click or Enter to finish (close: click first point)',
    text:'Click anywhere to type — click existing text to edit it',
    eraser:'Drag over a curve or text to erase it'
  };
  document.getElementById('stxt').textContent=m[t]||t;
}

// ═══════════════════════════════════════════════════════════
// GUIDES
// ═══════════════════════════════════════════════════════════
function togG(g){
  if(g==='sym'){ symOn=!symOn; document.getElementById('tog-sym').classList.toggle('on',symOn); }
  if(g==='grid'){ gridOn=!gridOn; document.getElementById('tog-grid').classList.toggle('on',gridOn); drawGrid(); }
}
function drawGrid(){
  ctxG.clearRect(0,0,CW,CH); if(!gridOn) return;
  ctxG.strokeStyle='rgba(255,255,255,.055)'; ctxG.lineWidth=.5; ctxG.setLineDash([]);
  for(let x=0;x<=CW;x+=40){ ctxG.beginPath();ctxG.moveTo(x,0);ctxG.lineTo(x,CH);ctxG.stroke(); }
  for(let y=0;y<=CH;y+=40){ ctxG.beginPath();ctxG.moveTo(0,y);ctxG.lineTo(CW,y);ctxG.stroke(); }
  ctxG.strokeStyle='rgba(59,139,250,.18)'; ctxG.lineWidth=1;
  ctxG.beginPath();ctxG.moveTo(CW/2,0);ctxG.lineTo(CW/2,CH);ctxG.stroke();
  ctxG.beginPath();ctxG.moveTo(0,CH/2);ctxG.lineTo(CW,CH/2);ctxG.stroke();
}

// ═══════════════════════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════════════════════
function switchView(v,btn){
  views[curView]={curves:JSON.parse(JSON.stringify(curves)),labels:JSON.parse(JSON.stringify(textLabels))};
  curView=v;
  const vd=views[v]||{curves:[],labels:[]};
  curves=JSON.parse(JSON.stringify(vd.curves||[]));
  textLabels=JSON.parse(JSON.stringify(vd.labels||[]));
  selectedId=null; penActive=false; penPts=[];
  document.querySelectorAll('.vt').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
  fullRender();
}

// ═══════════════════════════════════════════════════════════
// LAYERS
// ═══════════════════════════════════════════════════════════
function renderLayers(){
  const el=document.getElementById('lyrs'); el.innerHTML='';
  LAYERS.forEach(lay=>{
    const d=document.createElement('div');
    d.className='li'+(lay.id===activeLayer?' on':'');
    d.innerHTML=`<div class="ld" style="background:${lay.color}"></div>
      <span class="ln">${lay.name}</span>
      <button class="lib" onclick="togVis('${lay.id}',event)">${lay.vis?'👁':'○'}</button>
      <button class="lib" onclick="togLock('${lay.id}',event)">${lay.locked?'🔒':'🔓'}</button>`;
    d.onclick=()=>{ activeLayer=lay.id; renderLayers(); };
    el.appendChild(d);
  });
}
function togVis(id,e){ e.stopPropagation(); const l=LAYERS.find(x=>x.id===id); if(l){l.vis=!l.vis;renderLayers();fullRender();} }
function togLock(id,e){ e.stopPropagation(); const l=LAYERS.find(x=>x.id===id); if(l){l.locked=!l.locked;renderLayers();} }
function addLayer(){
  const n=prompt('Layer name:'); if(!n) return;
  const c=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#f86ca7'];
  const id='lay'+Date.now();
  LAYERS.push({id,name:n,color:c[LAYERS.length%5],vis:true,locked:false});
  activeLayer=id;
  renderLayers();
}

// ═══════════════════════════════════════════════════════════
// PHOTO
// ═══════════════════════════════════════════════════════════
function loadImg(inp){
  const f=inp.files[0]; if(!f) return;
  const img=new Image();
  img.onload=()=>{ paintPhoto(img); hideUpload(); toast('Photo loaded ✓'); };
  img.src=URL.createObjectURL(f); inp.value='';
}
function paintPhoto(img){
  ctxP.clearRect(0,0,CW,CH);
  const r=Math.min(CW/img.width,CH/img.height);
  ctxP.drawImage(img,(CW-img.width*r)/2,(CH-img.height*r)/2,img.width*r,img.height*r);
}
function loadDemo(){ hideUpload(); drawDemoHead(); toast('Demo head ready — use Pen tool (P) to draw'); }
function hideUpload(){ document.getElementById('uov').style.display='none'; }

// ═══════════════════════════════════════════════════════════
// EXPORT / SAVE
// ═══════════════════════════════════════════════════════════
function exportImg(){
  const exp=document.createElement('canvas'); exp.width=CW; exp.height=CH;
  const c=exp.getContext('2d');
  c.drawImage(cvP,0,0); c.drawImage(cvD,0,0);
  c.fillStyle='rgba(255,255,255,.18)'; c.font='11px system-ui';
  c.fillText('FolliMap Studio',8,CH-8);
  const a=document.createElement('a');
  a.href=exp.toDataURL('image/png',1); a.download=`follimap_${curView}_${Date.now()}.png`;
  a.click(); toast('Exported ✓');
}
function saveProj(){
  views[curView]={curves:JSON.parse(JSON.stringify(curves)),labels:JSON.parse(JSON.stringify(textLabels))};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({v:5,views,layers:LAYERS})],{type:'application/json'}));
  a.download=`follimap_${Date.now()}.json`; a.click(); toast('Saved ✓');
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.opacity='0',2800);
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
renderLayers();
applyT();
setTool('select');
